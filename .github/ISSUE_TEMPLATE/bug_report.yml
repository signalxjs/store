name: Bug report
description: Report a problem with @sigx/store
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! A small, self-contained reproduction makes a huge difference — please include one if you can.

  - type: input
    id: version
    attributes:
      label: "@sigx/store version"
      description: Run `npm ls @sigx/store` to find it.
      placeholder: "0.4.2"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: A link to a minimal reproduction (StackBlitz, CodeSandbox, or a small GitHub repo) is best. Inline code is fine for very small cases.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages and stack traces if any.
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.11.0"
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
    validations:
      required: false
